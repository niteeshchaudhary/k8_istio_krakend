apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kraken-config-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/niteeshchaudhary/k8_istio_krakend.git'
    targetRevision: HEAD
    path: k8s/overlays/dev/apps/kraken-config
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kraken-config
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

