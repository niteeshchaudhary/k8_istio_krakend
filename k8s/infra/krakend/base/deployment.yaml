apiVersion: apps/v1
kind: Deployment
metadata:
  name: krakend
  namespace: krakend
  labels:
    app: krakend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: krakend
  template:
    metadata:
      labels:
        app: krakend
        sidecar.istio.io/inject: "true"
    spec:
      initContainers:
      - name: fetch-config
        image: curlimages/curl:latest
        command:
        - "/bin/sh"
        - "-c"
        - |
          # The address of your config service
          CONFIG_URL="http://kraken-config.kraken-config.svc.cluster.local:5000/api/krakend-config"
          
          echo "Waiting for kraken-config to be ready..."
          # Try to fetch up to 10 times with a 2-second delay
          for i in $(seq 1 10); do
            echo "Attempt $i..."
            if curl -s -f "$CONFIG_URL" > /tmp/fetched.json; then
              if [ -s /tmp/fetched.json ]; then
                echo "Successfully fetched dynamic config after $i attempts"
                cp /tmp/fetched.json /etc/krakend/krakend.json
                exit 0
              fi
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done

          echo "Warning: kraken-config did not become ready in time. Using default."
          if [ -f /etc/krakend-default/krakend.json ]; then
            cp /etc/krakend-default/krakend.json /etc/krakend/krakend.json
          else
            echo "Error: Default config not found at /etc/krakend-default/krakend.json"
            exit 1
          fi
        volumeMounts:
        - name: krakend-config-default-vol
          mountPath: /etc/krakend-default
        - name: krakend-config-vol
          mountPath: /etc/krakend
      containers:
      - name: krakend
        image: krakend:latest
        ports:
        - containerPort: 8080
        args: ["run", "-c", "/etc/krakend/krakend.json", "-d"]
        volumeMounts:
        - name: krakend-config-vol
          mountPath: /etc/krakend
          readOnly: true
        - name: krakend-config-default-vol
          mountPath: /etc/krakend-default
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: krakend-config-default-vol
        configMap:
          name: krakend-config
      - name: krakend-config-vol
        emptyDir: {}
