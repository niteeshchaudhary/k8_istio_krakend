---
# Minimal values for Istio ingress gateway
revision: "1-25-0"
service:
  type: LoadBalancer
  ports:
    - name: status-port
      port: 15021
      protocol: TCP
      targetPort: 15021
    - name: http2
      port: 80
      protocol: TCP
      targetPort: 80
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
