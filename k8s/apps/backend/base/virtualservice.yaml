apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: backend
spec:
  gateways:
    - istio-system/main-gateway
  hosts:
    - mybackend # Internal host if accessed via Krakend or Istio Mesh
  http:
    - route:
      - destination:
          host: backend
          port:
            number: 8080
