apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: frontend
spec:
  gateways:
    - istio-system/main-gateway
  hosts:
    - myfrontend
    - myfrontend.frontend
  http:
    - route:
      - destination:
          host: frontend.frontend.svc.cluster.local
          port:
            number: 80
